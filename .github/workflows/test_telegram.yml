name: Test Telegram

on:
  workflow_dispatch:

jobs:
  test-telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run execute_trade.py
        run: python execute_trade.py
