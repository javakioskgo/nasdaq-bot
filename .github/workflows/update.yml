name: Update signal.json

on:
  workflow_dispatch:
  schedule:
    - cron: '20 21 * * 1-5'

permissions:
  contents: write

jobs:
  update-signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate signal.json
        run: python generate_signal.py

      - name: Commit updated signal.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signal.json
          git diff --staged --quiet || git commit -m "Update signal.json"
          git push
