name: Update signal.json

on:
  workflow_dispatch:
  schedule:
    # 🇰🇷 국내장 마감 후 (15:40 KST = 06:40 UTC)
    - cron: '40 6 * * 1-5'

    # 🇺🇸 미국장 마감 후 (서머타임 기준 06:10 KST = 21:10 UTC 전날)
    - cron: '10 21 * * 1-5'

permissions:
  contents: write

jobs:
  update-signal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate signal.json
        run: python generate_signal.py

      - name: Commit updated signal.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signal.json
          git diff --staged --quiet || git commit -m "Update signal.json"
          git push
