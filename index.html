<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ETF Signal</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #070d1f;
  color: #e5e7eb;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
}

.card {
  background: #111827;
  border-radius: 22px;
  padding: 22px;
  margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.title {
  font-size: 32px;
  font-weight: 900;
  margin-bottom: 10px;
}

.sub {
  color: #9ca3af;
  margin: 4px 0;
}

.section-title {
  font-size: 26px;
  font-weight: 800;
  margin-bottom: 14px;
}

/* ===== TOP PICK ===== */

.top-pick-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.top-pick-box {
  border-radius: 22px;
  padding: 24px;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  border: 1px solid rgba(255,255,255,0.1);
  text-align: center;
}

.pick-label {
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 8px;
}

.pick-value {
  font-size: 42px;
  font-weight: 900;
  color: #22d3ee;
  margin-bottom: 10px;
}

.pick-value.cash {
  color: #f87171;
}

.pick-date {
  font-size: 13px;
  color: #9ca3af;
}

/* ===== REASON ===== */

.reason {
  background: #0b1a33;
  border-radius: 16px;
  padding: 16px;
  margin-top: 12px;
  line-height: 1.8;
  font-size: 15px;
}

/* ===== METRIC ===== */

.metric-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 16px;
}

.metric {
  border: 1px solid #374151;
  border-radius: 14px;
  padding: 14px;
}

.metric .label {
  color: #9ca3af;
  margin-bottom: 6px;
}

.metric .value {
  font-size: 22px;
  font-weight: 800;
}

/* ===== MOBILE ===== */

@media (max-width: 768px) {
  .top-pick-grid {
    grid-template-columns: 1fr;
  }

  .pick-value {
    font-size: 34px;
  }
}
</style>
</head>

<body>
<div class="container">

  <div class="card">
    <div class="title" id="page-title"></div>
    <div class="sub" id="generated-at"></div>
    <div class="sub" id="page-notice"></div>
  </div>

  <!-- 🔥 TOP PICK -->
  <div class="card">
    <div class="section-title">오늘 추천</div>

    <div class="top-pick-grid">
      <div class="top-pick-box">
        <div class="pick-label">국내 ETF</div>
        <div class="pick-value" id="domestic-top-pick">-</div>
        <div class="pick-date" id="domestic-top-date"></div>
      </div>

      <div class="top-pick-box">
        <div class="pick-label">해외 ETF</div>
        <div class="pick-value" id="overseas-top-pick">-</div>
        <div class="pick-date" id="overseas-top-date"></div>
      </div>
    </div>
  </div>

  <!-- 🔥 REASON -->
  <div class="card" id="domestic-card"></div>
  <div class="card" id="overseas-card"></div>

</div>

<script>

/* 🔥 상태 한글 변환 */
function translateMarketState(state) {
  if (state === "UPTREND_RECOVERY") return "상승 추세";
  if (state === "EARLY_UPTREND") return "초기 상승";
  if (state === "DOWNTREND_CONFIRMED") return "하락 추세";
  if (state === "SIDEWAYS") return "횡보";
  if (state === "EMERGENCY_EXIT") return "긴급 이탈";
  if (state === "UNCLEAR") return "불명확";
  return state || "-";
}

/* 카드 metric */
function metric(label, value) {
  return `
    <div class="metric">
      <div class="label">${label}</div>
      <div class="value">${value ?? "-"}</div>
    </div>
  `;
}

/* 하단 카드 렌더링 */
function renderMarket(title, market) {
  if (!market) return `<div>데이터 없음</div>`;

  const p = market.primary_review || {};
  const d = p.display || {};

  return `
    <div class="section-title">${title}</div>

    <div class="reason">
      <strong>선정 이유</strong><br/>
      ${market.reason}
    </div>

    <div class="reason">
      <strong>판단</strong><br/>
      ${p.display_name} / ${p.recommendation} / ${translateMarketState(p.market_state)}
    </div>

    <div class="metric-grid">
      ${metric("종가", d.last_close)}
      ${metric("수익률", d.daily_return)}
      ${metric("EMA5", d.ema5)}
      ${metric("EMA20", d.ema20)}
      ${metric("EMA5 기울기", d.ema5_slope)}
      ${metric("EMA20 기울기", d.ema20_slope)}
    </div>
  `;
}

/* 데이터 로드 */
fetch("./signal.json?v=" + Date.now())
  .then(r => r.json())
  .then(data => {

    const domestic = data.markets.domestic;
    const overseas = data.markets.overseas;

    document.getElementById("page-title").textContent = data.title;
    document.getElementById("generated-at").textContent =
      `생성 시각: ${data.generated_at_kst}`;
    document.getElementById("page-notice").textContent =
      data.page_notice;

    /* TOP PICK */
    const domVal = domestic.signal_display_name;
    const domEl = document.getElementById("domestic-top-pick");
    domEl.textContent = domVal;

    if (domVal === "CASH") domEl.classList.add("cash");

    document.getElementById("domestic-top-date").textContent =
      `기준일: ${domestic.signal_date}`;

    const overVal = overseas.signal_display_name;
    const overEl = document.getElementById("overseas-top-pick");
    overEl.textContent = overVal;

    if (overVal === "CASH") overEl.classList.add("cash");

    document.getElementById("overseas-top-date").textContent =
      `기준일: ${overseas.signal_date}`;

    /* REASON */
    document.getElementById("domestic-card").innerHTML =
      renderMarket("국내 ETF 이유 설명", domestic);

    document.getElementById("overseas-card").innerHTML =
      renderMarket("해외 ETF 이유 설명", overseas);
  })
  .catch(err => {
    document.body.innerHTML = `<pre>에러 발생\n${err}</pre>`;
  });

</script>

</body>
</html>
