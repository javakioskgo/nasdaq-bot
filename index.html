<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ETF 전략</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #020617;
  color: white;
  padding: 16px;
  overflow-x: hidden;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
}

/* 상단 카드 */
.header {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 20px;
}

.header h1 {
  margin: 0;
  font-size: 26px;
}

.sub {
  opacity: 0.7;
  font-size: 14px;
}

/* 추천 카드 */
.top-pick-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.top-pick-box {
  border-radius: 20px;
  padding: 20px;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  text-align: center;
  overflow: hidden;
}

.pick-label {
  opacity: 0.7;
  font-size: 13px;
}

.pick-value {
  font-size: 32px;
  font-weight: 900;
  color: #22d3ee;
  word-break: keep-all;
  overflow-wrap: anywhere;
  line-height: 1.3;
}

/* 카드 공통 */
.section {
  margin-top: 28px;
}

.section h2 {
  margin-bottom: 14px;
}

.card {
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 12px;
}

.buy {
  background: linear-gradient(135deg, #065f46, #10b981);
}

.sell {
  background: linear-gradient(135deg, #7f1d1d, #ef4444);
}

.hold {
  background: linear-gradient(135deg, #78350f, #f59e0b);
}

.symbol {
  font-weight: bold;
  font-size: 18px;
}

.desc {
  font-size: 13px;
  opacity: 0.85;
  margin-top: 6px;
}

/* 모바일 */
@media (max-width: 768px) {
  .top-pick-grid {
    grid-template-columns: 1fr;
  }

  .pick-value {
    font-size: 24px;
  }
}
</style>
</head>

<body>
<div class="container">

  <div class="header">
    <h1>국내 / 해외 ETF 보유전략</h1>
    <div class="sub" id="time"></div>
  </div>

  <div class="section">
    <h2>오늘 추천 (매수)</h2>
    <div class="top-pick-grid" id="top-picks"></div>
  </div>

  <div class="section">
    <h2>전략 액션 요약</h2>
    <div id="actions"></div>
  </div>

</div>

<script>
fetch('signal.json')
  .then(res => res.json())
  .then(data => {

    document.getElementById("time").innerText =
      "생성 시각: " + data.generated_at;

    const top = document.getElementById("top-picks");
    const actions = document.getElementById("actions");

    const all = [
      ...data.domestic,
      ...data.overseas
    ];

    // 오늘 추천
    const buys = all.filter(x => x.action === "BUY");

    buys.forEach(item => {
      top.innerHTML += `
        <div class="top-pick-box">
          <div class="pick-label">${item.market}</div>
          <div class="pick-value">${item.name}</div>
          <div class="sub">${item.date}</div>
        </div>
      `;
    });

    // 전체 카드
    all.forEach(item => {

      let type = "hold";
      let title = "횡보 (판단보류)";

      if (item.action === "BUY") {
        type = "buy";
        title = "오늘 추천 (매수)";
      }

      if (item.action === "SELL") {
        type = "sell";
        title = "보유금지 (매도)";
      }

      actions.innerHTML += `
        <div class="card ${type}">
          <div><b>${title}</b></div>
          <div class="symbol">${item.name}</div>
          <div class="desc">
            상태: ${item.status} / 기준일: ${item.date}
          </div>
          <div class="desc">${item.reason}</div>
        </div>
      `;
    });

  });
</script>

</body>
</html>
